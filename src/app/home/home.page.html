<ion-header [translucent]="true">
  <ion-toolbar color="primary">
    <ion-title>
      Data Mahasiswa
    </ion-title>

    <!-- Tombol biasa di Header -->
    <ion-buttons slot="end">
      <ion-button routerLink="/tambah-mhs">Tambah Mahasiswa</ion-button>
    </ion-buttons>

  </ion-toolbar>
</ion-header>

<ion-content>
  <ion-list>
    <ion-item-sliding *ngFor="let mhs of dataMahasiswa">
      <ion-item [routerLink]="['/detail', mhs.id]" detail="true">
        <ion-label>
          <h2>{{ mhs.nama }}</h2>
          <p>NIM: {{ mhs.nim }} | Prodi: {{ mhs.jurusan }}</p>
        </ion-label>
      </ion-item>

      <!-- Geser item ke kiri untuk menampilkan tombol Edit & Hapus -->
      <ion-item-options side="end">

        <!-- Tombol Edit (BARU): ikon pensil, warna biru -->
        <ion-item-option color="primary" (click)="editData(mhs)">
          <ion-icon slot="icon-only" name="create"></ion-icon>
        </ion-item-option>

        <!-- Tombol Hapus (sudah ada): ikon tong sampah, warna merah -->
        <ion-item-option color="danger" (click)="hapusData(mhs.id, mhs.nama)">
          <ion-icon slot="icon-only" name="trash"></ion-icon>
        </ion-item-option>

      </ion-item-options>
    </ion-item-sliding>
  </ion-list>

  <!-- Tombol tambah melayang pojok kanan bawah -->
  <ion-fab slot="fixed" vertical="bottom" horizontal="end">
    <ion-fab-button routerLink="/tambah-mhs">
      <ion-icon name="add"></ion-icon>
    </ion-fab-button>
  </ion-fab>
</ion-content>
